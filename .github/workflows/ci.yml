name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  foundation-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Check foundation docs exist
        run: |
          test -f AGENTS.md
          test -f CONTEXT.md
          test -f README.md
          test -f docs/SPEC.md
          test -f docs/PLAN.md
          test -f docs/ARCHITECTURE.md
          test -f docs/VERIFY_LOG.md
          test -f docs/decisions/ADR-0001-project-foundation.md

      - name: Check Python V0 foundation markers
        run: |
          grep -q "patchtrace run -- codex" docs/SPEC.md
          grep -q "Python >=3.11" docs/ARCHITECTURE.md
          grep -q "src/patchtrace" docs/decisions/ADR-0001-project-foundation.md
