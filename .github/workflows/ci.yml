name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  phase-2-feedback-loop:
    name: Phase 2 feedback loop
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Install project
        run: uv sync --locked

      - name: Check CLI help path
        run: uv run patchtrace --help

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Typecheck
        run: uv run mypy src tests

      - name: Test
        run: uv run pytest

      - name: Build
        run: uv build
